    <text x="16" y="74" fill="#8cff9e" font-size="12" font-family="Consolas,monospace">[ok] 30 questions → review</text>
    <text x="16" y="94" fill="#8cff9e" font-size="12" font-family="Consolas,monospace">[ok] paper A/B exported</text>
    <text x="16" y="120" fill="#e3ff5c" font-size="12" font-family="Consolas,monospace">model_gateway: deepseek ✓</text>
