    <rect x="268" y="0" width="120" height="34" rx="17" fill="#e9e3d5"/>
    <text x="328" y="22" text-anchor="middle" font-weight="600" fill="#4a3b2e">宋风</text>
  </g>
  <g transform="translate(560,40)" opacity="0.92">
    <rect width="300" height="140" rx="10" fill="#0e140e" stroke="#1d3a1d"/>
    <text x="16" y="30" fill="#39ff14" font-size="13" font-family="Consolas,monospace">$ aiqs --generate</text>
