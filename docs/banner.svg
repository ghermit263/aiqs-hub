<svg xmlns="http://www.w3.org/2000/svg" width="900" height="220" viewBox="0 0 900 220" font-family="'Segoe UI','Microsoft YaHei',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5c6b73"/>
      <stop offset="1" stop-color="#3a4a52"/>
    </linearGradient>
  </defs>
  <rect width="900" height="220" rx="16" fill="url(#bg)"/>
  <text x="48" y="92" fill="#f5f1e8" font-size="44" font-weight="700">AIQS Hub · 智能题源中心</text>
  <text x="50" y="132" fill="#cfd8dc" font-size="20">上传资料 → AI 出题 → 人工审核 → 标准题库 → Excel 导出 / 组卷</text>
  <g transform="translate(50,158)" font-size="14" fill="#0e140e">
    <rect x="0" y="0" width="120" height="34" rx="17" fill="#39ff14"/>
    <text x="60" y="22" text-anchor="middle" font-weight="600">终端风</text>
    <rect x="134" y="0" width="120" height="34" rx="17" fill="#c9962e"/>
