<svg xmlns="http://www.w3.org/2000/svg" width="960" height="560" viewBox="0 0 960 560" font-family="'Songti SC','SimSun',serif">
  <rect width="960" height="560" fill="#f5f1e8"/>
  <!-- sider -->
  <rect width="180" height="560" fill="#e9e3d5"/>
  <text x="90" y="40" text-anchor="middle" font-size="17" fill="#4a3b2e" font-weight="700">智能题源中心</text>
  <g font-size="13" fill="#6b5444">
    <text x="24" y="86">▢ 工作台</text>
    <text x="24" y="120">▢ 资料管理</text>
    <text x="24" y="154">▢ 生成任务</text>
    <rect x="8" y="170" width="164" height="30" rx="5" fill="#d6cdb8"/>
    <text x="24" y="190" fill="#4a3b2e" font-weight="700">▣ 审核工作台</text>
    <text x="24" y="224">▢ 试卷组卷</text>
    <text x="24" y="258">▢ 标准题库</text>
    <text x="24" y="292">▢ 系统设置</text>
  </g>
  <g transform="translate(20,500)" font-size="11" fill="#8a7a68">
    <rect width="140" height="22" rx="11" fill="#d6cdb8"/>
    <text x="10" y="15" fill="#4a3b2e">皮肤 终端|唐|宋</text>
  </g>
  <!-- header -->
  <text x="200" y="44" font-size="20" fill="#4a3b2e" font-weight="700">审核工作台 <tspan font-size="13" fill="#8a7a68">共 28 题</tspan></text>
  <!-- left: queue -->
  <rect x="200" y="64" width="210" height="470" rx="6" fill="#fbf9f3" stroke="#ddd3c0"/>
  <g font-size="12">
    <rect x="208" y="72" width="194" height="48" rx="4" fill="#eef3f0" stroke="#cfd8cf"/>
    <rect x="214" y="80" width="42" height="16" rx="3" fill="#5c6b73"/><text x="235" y="92" text-anchor="middle" fill="#fff" font-size="10">单选题</text>
    <text x="214" y="113" fill="#4a3b2e">根据"守正创新"，下列关于…</text>
    <rect x="208" y="126" width="194" height="44" rx="4" fill="#fbf9f3"/>
    <rect x="214" y="132" width="42" height="16" rx="3" fill="#a98b5d"/><text x="235" y="144" text-anchor="middle" fill="#fff" font-size="10">判断题</text>
    <text x="214" y="164" fill="#4a3b2e">以人为本要求对员工以奋斗…</text>
    <rect x="208" y="176" width="194" height="44" rx="4" fill="#fbf9f3"/>
    <rect x="214" y="182" width="42" height="16" rx="3" fill="#5c6b73"/><text x="235" y="194" text-anchor="middle" fill="#fff" font-size="10">多选题</text>
    <text x="214" y="214" fill="#4a3b2e">属于战略价值的有哪几项？</text>
  </g>
  <!-- middle: edit form -->
  <rect x="418" y="64" width="320" height="470" rx="6" fill="#fbf9f3" stroke="#ddd3c0"/>
  <text x="432" y="92" font-size="13" fill="#4a3b2e" font-weight="700">题目 #12 — 单选题</text>
  <g font-size="11" fill="#8a7a68">
    <text x="432" y="118">题干</text>
    <rect x="432" y="124" width="292" height="44" rx="4" fill="#fff" stroke="#ddd3c0"/>
    <text x="440" y="142" fill="#4a3b2e" font-size="11">根据"守正创新"的要求，以下哪项属于</text>
    <text x="440" y="158" fill="#4a3b2e" font-size="11">"守正"的正确做法？（  ）</text>
    <text x="432" y="186">选项（每行一个）</text>
    <rect x="432" y="192" width="292" height="70" rx="4" fill="#fff" stroke="#ddd3c0"/>
    <text x="440" y="208" fill="#4a3b2e" font-size="11">A. 急功近利，追求短期业绩最大化</text>
    <text x="440" y="224" fill="#4a3b2e" font-size="11">B. 守网络强国之正，守好经营底线</text>
    <text x="440" y="240" fill="#4a3b2e" font-size="11">C. 为了创新而创新，脱离实际</text>
    <text x="440" y="256" fill="#4a3b2e" font-size="11">D. 推诿守旧，畏难退缩</text>
    <text x="432" y="284">答案</text>
    <rect x="432" y="290" width="80" height="26" rx="4" fill="#fff" stroke="#ddd3c0"/><text x="440" y="307" fill="#4a3b2e">B</text>
    <text x="432" y="338">难度 / 大类 / 小类</text>
    <rect x="432" y="344" width="90" height="26" rx="4" fill="#fff" stroke="#ddd3c0"/><text x="440" y="361" fill="#4a3b2e">中等</text>
    <rect x="528" y="344" width="90" height="26" rx="4" fill="#fff" stroke="#ddd3c0"/><text x="536" y="361" fill="#4a3b2e">战略</text>
    <rect x="624" y="344" width="100" height="26" rx="4" fill="#fff" stroke="#ddd3c0"/>
  </g>
  <g font-size="12">
    <rect x="432" y="392" width="60" height="30" rx="5" fill="#fff" stroke="#5c6b73"/><text x="462" y="412" text-anchor="middle" fill="#5c6b73">保存</text>
    <rect x="500" y="392" width="60" height="30" rx="5" fill="#5c6b73"/><text x="530" y="412" text-anchor="middle" fill="#fff">通过</text>
    <rect x="568" y="392" width="60" height="30" rx="5" fill="#fff" stroke="#a98b5d"/><text x="598" y="412" text-anchor="middle" fill="#a98b5d">退回</text>
    <rect x="636" y="392" width="60" height="30" rx="5" fill="#fff" stroke="#9c5a4a"/><text x="666" y="412" text-anchor="middle" fill="#9c5a4a">删除</text>
  </g>
  <!-- right: source -->
  <rect x="746" y="64" width="196" height="470" rx="6" fill="#fbf9f3" stroke="#ddd3c0"/>
  <text x="758" y="90" font-size="12" fill="#4a3b2e" font-weight="700">来源原文 — 第3页</text>
  <rect x="756" y="100" width="176" height="200" rx="4" fill="#f1ece0" stroke="#ddd3c0"/>
  <g font-size="10.5" fill="#6b5444">
    <text x="764" y="120">守正是"本分"：守网络强</text>
    <text x="764" y="136">国之正，守好经营和服务</text>
    <text x="764" y="152">的底线。创新是"本事"：</text>
    <text x="764" y="168">创数智服务之新，用数智</text>
    <text x="764" y="184">服务为客户和公司创造价</text>
    <text x="764" y="200">值。要树立正确的业绩观…</text>
  </g>
</svg>
